<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LocalMind — Tests</title>
  <style>
    body { font-family: monospace; background: #0f172a; color: #e2e8f0; padding: 24px; line-height: 1.6; }
    h1   { color: #818cf8; margin-bottom: 4px; }
    h2   { color: #94a3b8; font-size: 0.9rem; margin: 24px 0 8px; border-bottom: 1px solid #1e293b; padding-bottom: 4px; }
    .pass { color: #34d399; }
    .fail { color: #f87171; }
    .skip { color: #fbbf24; }
    .summary { margin-top: 24px; font-size: 1rem; font-weight: bold; }
    pre  { background: #1e293b; padding: 8px 12px; border-radius: 6px; font-size: 0.78rem; white-space: pre-wrap; }
    .result { margin: 2px 0; font-size: 0.82rem; }
  </style>
</head>
<body>
  <h1>LocalMind Tests</h1>
  <div id="output"></div>

  <script type="module">
    // ── Test runner ──────────────────────────────────────────────
    let passed = 0, failed = 0;
    const out = document.getElementById('output');

    function section(name) {
      const h = document.createElement('h2');
      h.textContent = name;
      out.appendChild(h);
    }

    function assert(label, condition, detail = '') {
      const div = document.createElement('div');
      div.className = 'result';
      if (condition) {
        div.innerHTML = `<span class="pass">✓</span> ${label}`;
        passed++;
      } else {
        div.innerHTML = `<span class="fail">✗</span> ${label}${detail ? ` — <em>${detail}</em>` : ''}`;
        failed++;
      }
      out.appendChild(div);
    }

    function assertClose(label, a, b, tol = 1e-6) {
      assert(label, Math.abs(a - b) < tol, `got ${a}, expected ~${b}`);
    }

    function assertEq(label, a, b) {
      assert(label, JSON.stringify(a) === JSON.stringify(b), `got ${JSON.stringify(a)}, expected ${JSON.stringify(b)}`);
    }

    // ── Functions under test (copied verbatim from index.html) ───

    function escapeHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function cosineSimilarity(a, b) {
      let dot = 0, normA = 0, normB = 0;
      for (let i = 0; i < a.length; i++) {
        dot += a[i] * b[i];
        normA += a[i] * a[i];
        normB += b[i] * b[i];
      }
      return dot / (Math.sqrt(normA) * Math.sqrt(normB) + 1e-8);
    }

    function chunkText(text, maxChars = 900, overlapChars = 200) {
      const sentences = text.match(/[^.!?\n]+[.!?\n]+|[^.!?\n]+$/g) || [text];
      const chunks = [];
      let current = '';
      for (const sentence of sentences) {
        if (current.length + sentence.length > maxChars && current.length > 0) {
          chunks.push(current.trim());
          const words = current.split(/\s+/);
          const overlapWords = [];
          let len = 0;
          for (let i = words.length - 1; i >= 0 && len < overlapChars; i--) {
            overlapWords.unshift(words[i]);
            len += words[i].length + 1;
          }
          current = overlapWords.join(' ') + ' ' + sentence;
        } else {
          current += (current ? ' ' : '') + sentence;
        }
      }
      if (current.trim()) chunks.push(current.trim());
      return chunks;
    }

    function extractiveSummary(text, maxSentences = 3) {
      const sentences = text.match(/[^.!?\n]+[.!?]+/g) || [];
      if (sentences.length <= maxSentences) return text.slice(0, 300);
      const scored = sentences.map((s, i) => ({
        text: s.trim(),
        score: s.split(/\s+/).length * (1 - i / sentences.length * 0.3),
      }));
      scored.sort((a, b) => b.score - a.score);
      return scored.slice(0, maxSentences).map(s => s.text).join(' ');
    }

    function relTime(ts) {
      const m = Math.floor((Date.now() - ts) / 60000);
      if (m < 1) return 'just now';
      if (m < 60) return `${m}m ago`;
      const h = Math.floor(m / 60);
      if (h < 24) return `${h}h ago`;
      const d = Math.floor(h / 24);
      if (d < 30) return `${d}d ago`;
      return new Date(ts).toLocaleDateString();
    }

    function srcBasename(src) {
      if (!src) return 'unknown';
      return src.includes('/') ? src.split('/').pop() : src;
    }

    // Crypto helpers (from share link implementation)
    function b64ToArr(b64) { return Uint8Array.from(atob(b64), c => c.charCodeAt(0)); }
    function arrToB64(arr) { return btoa(String.fromCharCode(...new Uint8Array(arr))); }

    async function deriveKey(passphrase, salt) {
      const enc = new TextEncoder();
      const keyMat = await crypto.subtle.importKey('raw', enc.encode(passphrase), { name: 'PBKDF2' }, false, ['deriveKey']);
      return crypto.subtle.deriveKey(
        { name: 'PBKDF2', salt, hash: 'SHA-256', iterations: 200000 },
        keyMat, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']
      );
    }

    async function encryptPayload(json, passphrase) {
      const salt = crypto.getRandomValues(new Uint8Array(16));
      const iv   = crypto.getRandomValues(new Uint8Array(12));
      const key  = await deriveKey(passphrase, salt);
      const data = new TextEncoder().encode(json);
      const cipher = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, data);
      return `${arrToB64(salt)}.${arrToB64(iv)}.${arrToB64(cipher)}`;
    }

    async function decryptPayload(encoded, passphrase) {
      const parts = encoded.split('.');
      if (parts.length !== 3) throw new Error('Invalid format');
      const [saltB64, ivB64, cipherB64] = parts;
      const salt = b64ToArr(saltB64), iv = b64ToArr(ivB64), cipher = b64ToArr(cipherB64);
      const key = await deriveKey(passphrase, salt);
      const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, cipher);
      return new TextDecoder().decode(plain);
    }

    // ── Tests ────────────────────────────────────────────────────

    // escapeHtml
    section('escapeHtml');
    assertEq('ampersand',       escapeHtml('a & b'),       'a &amp; b');
    assertEq('less-than',       escapeHtml('a < b'),       'a &lt; b');
    assertEq('greater-than',    escapeHtml('a > b'),       'a &gt; b');
    assertEq('double quote',    escapeHtml('a "b"'),       'a &quot;b&quot;');
    assertEq('script tag',      escapeHtml('<script>'),    '&lt;script&gt;');
    assertEq('no special chars', escapeHtml('hello'),      'hello');
    assertEq('empty string',    escapeHtml(''),             '');

    // cosineSimilarity
    section('cosineSimilarity');
    assertClose('identical vectors → 1',  cosineSimilarity([1, 0, 0], [1, 0, 0]), 1.0);
    assertClose('opposite vectors → -1',  cosineSimilarity([1, 0], [-1, 0]), -1.0);
    assertClose('orthogonal vectors → 0', cosineSimilarity([1, 0], [0, 1]), 0.0);
    assertClose('45° vectors',            cosineSimilarity([1, 1], [1, 0]), 1 / Math.SQRT2);
    assertClose('scale invariant',        cosineSimilarity([2, 0], [100, 0]), 1.0);
    assertClose('negative components',    cosineSimilarity([-1, -1], [-1, -1]), 1.0);
    assert('zero vector returns near-zero (no crash)', isFinite(cosineSimilarity([0, 0], [1, 0])));

    // chunkText
    section('chunkText');
    {
      const short = 'Hello world.';
      const chunks = chunkText(short, 900, 200);
      assert('short text → single chunk',      chunks.length === 1);
      assertEq('short text content preserved', chunks[0], 'Hello world.');
    }
    {
      const empty = '';
      const chunks = chunkText(empty, 900, 200);
      assert('empty string → no chunks',       chunks.length === 0);
    }
    {
      // Build text > 900 chars across multiple sentences
      const sentence = 'This is a test sentence that is exactly long enough. ';
      const text = sentence.repeat(20); // ~1040 chars
      const chunks = chunkText(text, 900, 200);
      assert('long text → multiple chunks',    chunks.length >= 2);
      assert('all chunks within maxChars',     chunks.every(c => c.length <= 900 + 300)); // overlap can push slightly over
      assert('no chunk is empty',              chunks.every(c => c.trim().length > 0));
    }
    {
      const sentence = 'Abc. ';
      const text = sentence.repeat(5); // short text
      const chunks = chunkText(text, 50, 10);
      assert('small maxChars → chunks produced', chunks.length >= 1);
    }
    {
      // Overlap: second chunk should share words from end of first
      const text = 'Word1 word2 word3 word4 word5. Word6 word7 word8 word9 word10 word11 word12 word13 word14 word15 word16 word17 word18 word19 word20.';
      const chunks = chunkText(text, 80, 30);
      if (chunks.length >= 2) {
        // The second chunk should start with some words from the first
        const firstWords = new Set(chunks[0].split(/\s+/));
        const secondWords = chunks[1].split(/\s+/);
        const overlap = secondWords.filter(w => firstWords.has(w));
        assert('chunks have overlap', overlap.length > 0);
      }
    }

    // extractiveSummary
    section('extractiveSummary');
    {
      const short = 'One sentence only.';
      const s = extractiveSummary(short, 3);
      assert('short text → returns slice of original', s.length <= 300);
    }
    {
      const text = [
        'The quick brown fox jumps over the lazy dog.',
        'WebGPU is a new graphics API for the web.',
        'Machine learning models can run in the browser.',
        'LocalMind uses Gemma for on-device AI.',
        'Privacy is important for personal data.',
      ].join(' ');
      const s = extractiveSummary(text, 2);
      const resultSentences = s.split(/(?<=[.!?])\s+/);
      assert('summary has ≤ maxSentences', resultSentences.length <= 3); // slight tolerance for trailing content
      assert('summary is a non-empty string', s.length > 0);
    }
    {
      const s3 = extractiveSummary('A. B. C. D. E.', 3);
      assert('exactly maxSentences returned from multi-sentence text', s3.length > 0);
    }

    // relTime
    section('relTime');
    {
      const now = Date.now();
      assertEq('just now (< 1m)',   relTime(now - 30_000),        'just now');
      assertEq('1m ago',            relTime(now - 60_000),        '1m ago');
      assertEq('45m ago',           relTime(now - 45 * 60_000),   '45m ago');
      assertEq('1h ago',            relTime(now - 60 * 60_000),   '1h ago');
      assertEq('23h ago',           relTime(now - 23 * 3600_000), '23h ago');
      assertEq('1d ago',            relTime(now - 24 * 3600_000), '1d ago');
      assertEq('29d ago',           relTime(now - 29 * 86400_000),'29d ago');
      // 31 days → returns toLocaleDateString, just check it's not a relative string
      const old = relTime(now - 31 * 86400_000);
      assert('31d+ → locale date string', old.includes('/') || old.includes('-') || old.match(/\d{4}/));
    }

    // srcBasename
    section('srcBasename');
    assertEq('unix path',         srcBasename('notes/meeting.md'),         'meeting.md');
    assertEq('nested path',       srcBasename('a/b/c/file.pdf'),           'file.pdf');
    assertEq('no slash',          srcBasename('document.txt'),             'document.txt');
    assertEq('null/empty → unknown', srcBasename(''),                      'unknown');
    assertEq('undefined → unknown',  srcBasename(null),                    'unknown');
    assertEq('trailing filename', srcBasename('folder/sub/report.docx'),   'report.docx');

    // Crypto: encrypt/decrypt round-trip
    section('encryptPayload / decryptPayload (AES-256-GCM)');
    {
      const payload = JSON.stringify({ v: 1, messages: [{ role: 'user', content: 'Hello' }] });

      try {
        const encoded = await encryptPayload(payload, 'test-passphrase');
        assert('encoded has 3 parts (salt.iv.cipher)', encoded.split('.').length === 3);

        const decoded = await decryptPayload(encoded, 'test-passphrase');
        assertEq('round-trip: decrypted matches original', decoded, payload);

        try {
          await decryptPayload(encoded, 'wrong-passphrase');
          assert('wrong passphrase should throw', false, 'did not throw');
        } catch {
          assert('wrong passphrase throws', true);
        }

        const unicode = JSON.stringify({ text: '日本語テスト 🧠' });
        const encUni = await encryptPayload(unicode, 'unicode-pass');
        const decUni = await decryptPayload(encUni, 'unicode-pass');
        assertEq('round-trip: unicode payload', decUni, unicode);

        const large = JSON.stringify({ content: 'x'.repeat(10_000) });
        const encLarge = await encryptPayload(large, 'large-pass');
        const decLarge = await decryptPayload(encLarge, 'large-pass');
        assertEq('round-trip: 10KB payload', decLarge, large);

        // Each encryption should produce a different ciphertext (random IV + salt)
        const enc1 = await encryptPayload(payload, 'test-passphrase');
        const enc2 = await encryptPayload(payload, 'test-passphrase');
        assert('different ciphertexts each call (random IV)', enc1 !== enc2);

      } catch (e) {
        assert('crypto tests completed without unexpected error', false, e.message);
      }
    }

    // Summary
    const summary = document.createElement('div');
    summary.className = 'summary';
    summary.innerHTML = `<span class="${failed ? 'fail' : 'pass'}">${passed} passed, ${failed} failed</span>`;
    out.appendChild(summary);
  </script>
</body>
</html>
