name: Sync to Hugging Face Space

on:
  push:
    branches: [main]
    paths: [index.html]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Push to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git clone https://NakliTechie:$HF_TOKEN@huggingface.co/spaces/naklitechie/LocalMind /tmp/hf-space
          cp index.html /tmp/hf-space/index.html
          cd /tmp/hf-space
          git config user.email "chirag@naklitechie.com"
          git config user.name "NakliTechie"
          git add index.html
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Sync from GitHub $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
